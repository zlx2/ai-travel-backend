logging:
  level:
    root: OFF

server:
  # 本地端口被占用时可通过 SERVER_PORT 覆盖，默认仍使用 8080。
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: ${SERVER_CONTEXT_PATH:/api}

spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: plango-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST}:${MYSQL_PORT}/${MYSQL_DATABASE}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=${MYSQL_CONNECT_TIMEOUT:3000}&socketTimeout=${MYSQL_SOCKET_TIMEOUT:10000}&tcpKeepAlive=true
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
    hikari:
      minimum-idle: ${DB_POOL_MIN_IDLE:2}
      maximum-pool-size: ${DB_POOL_MAX_SIZE:10}
      connection-timeout: ${DB_POOL_CONNECTION_TIMEOUT:3000}
      validation-timeout: ${DB_POOL_VALIDATION_TIMEOUT:1000}
      initialization-fail-timeout: ${DB_POOL_INIT_FAIL_TIMEOUT:0}
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:52417}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
      database: ${REDIS_DATABASE:0}
  rabbitmq:
    host: ${RABBITMQ_HOST}
    port: ${RABBITMQ_PORT}
    username: ${RABBITMQ_USERNAME}
    password: ${RABBITMQ_PASSWORD}
    virtual-host: ${RABBITMQ_VHOST:/ai-travel}
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail.smtp.ssl.enable: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB
  ai:
    model:
      chat: deepseek
      embedding: dashscope
      # 一期只启用文本对话和文本向量模型。
      image: none
      audio:
        transcription: none
        speech: none
      moderation: none
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
      chat:
        options:
          model: ${DEEPSEEK_MODEL:deepseek-v4-flash}
    dashscope:
      api-key: ${DASHSCOPE_API_KEY}
      base-url: ${DASHSCOPE_BASE_URL:https://dashscope.aliyuncs.com}
      chat:
        enabled: false
      embedding:
        options:
          model: text-embedding-v4
          dimensions: 1024

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 2592000
  active-timeout: -1
  is-concurrent: true
  is-share: true
  token-style: uuid
  is-log: false

app:
  cache:
    key-prefix: ${CACHE_KEY_PREFIX:plango:dev}
  redis-stack:
    host: ${REDIS_STACK_HOST:localhost}
    port: ${REDIS_STACK_PORT:52417}
    username: ${REDIS_STACK_USERNAME:}
    password: ${REDIS_STACK_PASSWORD:}
    timeout: 3000ms
  cos:
    secret-id: ${COS_SECRET_ID}
    secret-key: ${COS_SECRET_KEY}
    bucket: ${COS_BUCKET}
    region: ${COS_REGION}
    domain: ${COS_DOMAIN}
  ai:
    mock-enabled: ${AI_MOCK_ENABLED:false}
    deepseek-direct-enabled: ${DEEPSEEK_DIRECT_ENABLED:true}
    deepseek-disable-thinking: ${DEEPSEEK_DISABLE_THINKING:true}
    deepseek-timeout: ${DEEPSEEK_TIMEOUT:45s}
    response-cache-enabled: ${AI_RESPONSE_CACHE_ENABLED:true}
    response-cache-ttl: ${AI_RESPONSE_CACHE_TTL:12h}
  amap:
    api-key: ${AMAP_API_KEY:}
    base-url: ${AMAP_BASE_URL:https://restapi.amap.com}
    timeout: ${AMAP_TIMEOUT:10s}
    poi-cache-enabled: ${AMAP_POI_CACHE_ENABLED:true}
    day-query-parallelism: ${AMAP_DAY_QUERY_PARALLELISM:2}
  weather:
    cache-ttl: ${WEATHER_CACHE_TTL:6h}
    geo-timeout-ms: ${WEATHER_GEO_TIMEOUT_MS:2500}
    forecast-timeout-ms: ${WEATHER_FORECAST_TIMEOUT_MS:3000}
  alipay:
    enabled: ${ALIPAY_ENABLED:false}
    gateway-url: ${ALIPAY_GATEWAY_URL:https://openapi-sandbox.dl.alipaydev.com/gateway.do}
    app-id: ${ALIPAY_APP_ID:}
    app-private-key: ${ALIPAY_APP_PRIVATE_KEY:}
    alipay-public-key: ${ALIPAY_PUBLIC_KEY:}
    notify-url: ${ALIPAY_NOTIFY_URL:}
    return-url: ${ALIPAY_RETURN_URL:}
    sign-type: RSA2
    charset: UTF-8
